preprocessing_node:
  ros__parameters:
    input_topic: /perception/points
    output_topic: /preprocessing/points
    # workspace crop in fr3_link0 (tabletop = z 0). Box lives ~x[0.35,0.55] y[-0.5,-0.1] z[0,0.4].
    crop_min: [-0.25, -0.65, -0.012]
    crop_max: [0.70, 0.05, 0.40]
    # crop_min: [0.05, -0.50, -0.01]
    # crop_max: [0.75,  0.20,  0.40]
    voxel_size: 0.005
    remove_outliers: true
    sor_neighbors: 20
    sor_std_ratio: 2.0
